# AI-assisted (Claude Code, claude.ai) — https://claude.ai
name: Regenerate Live Checklist

on:
  push:
    branches: [main]
    paths:
      - "REQUIREMENTS_CHECKLIST.md"
      - "scripts/generate_checklist.py"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate checklist page
        run: python3 scripts/generate_checklist.py

      - name: Deploy to gh-pages
        run: |
          # Stash generated file before switching branches
          cp docs/checklist/index.html /tmp/checklist.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          mkdir -p checklist
          cp /tmp/checklist.html checklist/index.html

          git add checklist/index.html
          git diff --staged --quiet || git commit -m "chore: regenerate live checklist"
          git push origin gh-pages
